<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMO Mecha-Cat - KimiaKu</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app-container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 32px;
      padding: 40px 30px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .app-title {
      color: #f8fafc;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 25px;
      text-shadow: 0 2px 10px rgba(56, 189, 248, 0.5);
    }

    .avatar-wrapper {
      position: relative;
      width: 230px;
      height: 260px;
      margin-bottom: 25px;
      animation: hover-robot 4s ease-in-out infinite;
    }

    .robot-cat-svg {
      width: 100%;
      height: 100%;
      cursor: pointer;
      filter: drop-shadow(0 20px 25px rgba(0,0,0,0.6));
    }

    @keyframes hover-robot {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    @keyframes spin {
      0% { transform: scaleX(1); }
      50% { transform: scaleX(-0.2); }
      100% { transform: scaleX(1); }
    }
    .propeller {
      transform-origin: 100px 25px;
      animation: spin 0.3s linear infinite;
    }

    @keyframes blink {
      0%, 96%, 98%, 100% { transform: scaleY(1); }
      97%, 99% { transform: scaleY(0.1); }
    }
    .eye-lid { 
      transform-origin: center; 
      animation: blink 5s infinite; 
    }
    
    .pupil-group {
      transition: transform 0.1s ease-out;
    }

    .speech-bubble {
      background: rgba(248, 250, 252, 0.95);
      color: #0f172a;
      font-size: 0.95rem;
      padding: 16px 22px;
      border-radius: 20px;
      margin-bottom: 30px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      position: relative;
      font-weight: 600;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 0 12px 12px 12px;
      border-style: solid;
      border-color: transparent transparent rgba(248, 250, 252, 0.95) transparent;
    }

    .mic-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    #micBtn {
      background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 15px 30px;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(3, 105, 161, 0.4), inset 0 2px 0 rgba(255,255,255,0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #micBtn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(3, 105, 161, 0.6), inset 0 2px 0 rgba(255,255,255,0.3);
    }

    #micBtn:active {
      transform: translateY(1px);
    }

    #micBtn.mic-active {
      background: linear-gradient(135deg, #f43f5e 0%, #be123c 100%);
      box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.6);
      animation: pulse-red 1.5s infinite;
      border-color: rgba(255,255,255,0.3);
    }

    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.6); }
      70% { box-shadow: 0 0 0 15px rgba(244, 63, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
    }

    #micStatus {
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 500;
      min-height: 20px;
    }

    .hint {
      color: #475569;
      font-size: 0.75rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="app-title">IMO MECHA-CAT v3.1</div>

    <div class="avatar-wrapper">
      <svg id="fs" class="robot-cat-svg" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="metal-dome" cx="50%" cy="25%" r="75%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="35%" stop-color="#cbd5e1" />
            <stop offset="85%" stop-color="#64748b" />
            <stop offset="100%" stop-color="#334155" />
          </radialGradient>
          
          <linearGradient id="metal-body" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#64748b" />
            <stop offset="20%" stop-color="#94a3b8" />
            <stop offset="50%" stop-color="#e2e8f0" />
            <stop offset="80%" stop-color="#94a3b8" />
            <stop offset="100%" stop-color="#475569" />
          </linearGradient>

          <radialGradient id="reactor-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#38bdf8" stop-opacity="1" />
            <stop offset="60%" stop-color="#0284c7" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#0c4a6e" stop-opacity="0" />
          </radialGradient>

          <linearGradient id="bronze" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fbbf24" />
            <stop offset="50%" stop-color="#d97706" />
            <stop offset="100%" stop-color="#92400e" />
          </linearGradient>

          <radialGradient id="glass-bulb" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
            <stop offset="50%" stop-color="#bae6fd" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#0369a1" stop-opacity="0.2"/>
          </radialGradient>
          
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <rect x="75" y="165" width="50" height="30" rx="4" fill="url(#metal-body)" stroke="#1e293b" stroke-width="2"/>
        <line x1="75" y1="175" x2="125" y2="175" stroke="#334155" stroke-width="2"/>
        <line x1="75" y1="185" x2="125" y2="185" stroke="#334155" stroke-width="2"/>
        
        <path d="M 45 190 Q 100 175 155 190 L 165 245 Q 100 270 35 245 Z" fill="url(#metal-body)" stroke="#1e293b" stroke-width="3"/>
        
        <path d="M 65 200 L 135 200 L 125 240 L 75 240 Z" fill="#94a3b8" stroke="#475569" stroke-width="2"/>
        
        <circle cx="100" cy="220" r="14" fill="url(#reactor-glow)" filter="url(#glow)"/>
        <circle cx="100" cy="220" r="6" fill="#e0f2fe"/>
        <circle cx="100" cy="220" r="15" fill="none" stroke="#0f172a" stroke-width="2" stroke-dasharray="4 2"/>

        <path d="M 35 195 Q 15 215 25 240" fill="none" stroke="url(#metal-body)" stroke-width="14" stroke-linecap="round"/>
        <path d="M 165 195 Q 185 215 175 240" fill="none" stroke="url(#metal-body)" stroke-width="14" stroke-linecap="round"/>

        <circle cx="100" cy="120" r="50" fill="#0f172a"/>
        
        <path d="M 54 125 Q 100 90 146 125 Q 150 168 100 168 Q 50 168 54 125 Z" fill="#f8fafc"/>

        <g class="eye-lid">
          <circle cx="75" cy="115" r="14" fill="#059669"/> 
          <circle cx="75" cy="115" r="12" fill="#10b981"/> 
          
          <g class="pupil-group" id="pupilL">
            <path d="M 75 103 Q 79 115 75 127 Q 71 115 75 103 Z" fill="#022c22"/>
            <circle cx="71" cy="110" r="3.5" fill="#ffffff"/> 
            <circle cx="77" cy="120" r="1.5" fill="#ffffff" opacity="0.7"/>
          </g>

          <circle cx="125" cy="115" r="14" fill="#059669"/> 
          <circle cx="125" cy="115" r="12" fill="#10b981"/> 
          
          <g class="pupil-group" id="pupilR">
            <path d="M 125 103 Q 129 115 125 127 Q 121 115 125 103 Z" fill="#022c22"/>
            <circle cx="121" cy="110" r="3.5" fill="#ffffff"/> 
            <circle cx="127" cy="120" r="1.5" fill="#ffffff" opacity="0.7"/>
          </g>
        </g>

        <path d="M 94 135 Q 100 133 106 135 L 100 142 Z" fill="#f43f5e"/>
        
        <path d="M 88 147 Q 94 153 100 147 Q 106 153 112 147" fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

        <path d="M 82 136 Q 60 128 42 132" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
        <path d="M 82 143 Q 60 143 38 145" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
        <path d="M 84 150 Q 60 158 45 166" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
        
        <path d="M 118 136 Q 140 128 158 132" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
        <path d="M 118 143 Q 140 143 162 145" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
        <path d="M 116 150 Q 140 158 155 166" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>

        <path d="M 38 100 Q 38 28 100 28 Q 162 28 162 100 Z" fill="url(#metal-dome)" stroke="#1e293b" stroke-width="2.5"/>
        <rect x="33" y="97" width="134" height="12" rx="6" fill="url(#metal-body)" stroke="#0f172a" stroke-width="2"/>
        
        <circle cx="50" cy="103" r="2.5" fill="#334155" stroke="#0f172a" stroke-width="0.5"/>
        <circle cx="75" cy="103" r="2.5" fill="#334155" stroke="#0f172a" stroke-width="0.5"/>
        <circle cx="100" cy="103" r="2.5" fill="#334155" stroke="#0f172a" stroke-width="0.5"/>
        <circle cx="125" cy="103" r="2.5" fill="#334155" stroke="#0f172a" stroke-width="0.5"/>
        <circle cx="150" cy="103" r="2.5" fill="#334155" stroke="#0f172a" stroke-width="0.5"/>
        
        <circle cx="65" cy="65" r="4" fill="url(#bronze)" stroke="#1e293b" stroke-width="1.5"/>
        <circle cx="135" cy="65" r="4" fill="url(#bronze)" stroke="#1e293b" stroke-width="1.5"/>
        <circle cx="100" cy="48" r="4" fill="url(#bronze)" stroke="#1e293b" stroke-width="1.5"/>

        <path d="M 45 78 L 28 68" stroke="url(#metal-body)" stroke-width="5" stroke-linecap="round"/>
        <circle cx="22" cy="64" r="12" fill="url(#glass-bulb)" stroke="#64748b" stroke-width="1.5"/>
        <circle cx="22" cy="64" r="4" fill="#fef08a" opacity="0.6" filter="url(#glow)"/>
        
        <path d="M 155 78 L 172 68" stroke="url(#metal-body)" stroke-width="5" stroke-linecap="round"/>
        <circle cx="178" cy="64" r="12" fill="url(#glass-bulb)" stroke="#64748b" stroke-width="1.5"/>
        <circle cx="178" cy="64" r="4" fill="#fef08a" opacity="0.6" filter="url(#glow)"/>

        <rect x="97" y="10" width="6" height="18" fill="url(#metal-body)" stroke="#1e293b" stroke-width="1.5"/>
        <ellipse class="propeller" cx="100" cy="10" rx="28" ry="4.5" fill="url(#bronze)" stroke="#78350f" stroke-width="1.5"/>
        <circle cx="100" cy="10" r="4.5" fill="#334155" stroke="#0f172a" stroke-width="1"/>
      </svg>
    </div>

    <div class="speech-bubble" id="sb">
      Sistem Mecha-Cat Online. Ada yang bisa dibantu?
    </div>

    <div class="mic-area">
      <button id="micBtn" title="Klik untuk berbicara">
        <span style="font-size: 1.3rem;">🎙️</span> Akses Mikrofon
      </button>
      <span id="micStatus">Menunggu input suara...</span>
    </div>
    <div class="hint">Gerakkan kursor untuk interaksi mata</div>
  </div>

  <script src="AIHandler.js"></script>
  
  <script>
    // Gerakan grup pupil (pupil + kilatan cahaya) lebih smooth
    const fs = document.getElementById('fs');
    document.addEventListener('mousemove', (e) => {
        const pupilL = document.getElementById('pupilL');
        const pupilR = document.getElementById('pupilR');
        const fsRect = fs.getBoundingClientRect();
        
        const mouseX = e.clientX - fsRect.left;
        const mouseY = e.clientY - fsRect.top;

        const updatePupil = (pupilElement, eyeX) => {
            const eyeY = 115;
            const dx = mouseX - eyeX;
            const dy = mouseY - eyeY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            const maxMove = 4.5; 
            // Tambahkan pembatasan gerak agar pupil tidak keluar dari iris
            let moveX = (dx / dist) * maxMove || 0; 
            let moveY = (dy / dist) * maxMove || 0; 

            // Jika kursor dekat dengan mata, kurangi pergerakan
            if (dist < 40) {
              moveX = (dx / 40) * maxMove;
              moveY = (dy / 40) * maxMove;
            }
            
            pupilElement.style.transform = `translate(${moveX}px, ${moveY}px)`;
        };

        updatePupil(pupilL, 75);
        updatePupil(pupilR, 125);
    });
  </script>
</body>
</html>
